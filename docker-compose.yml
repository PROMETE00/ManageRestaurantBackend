version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: restaurant_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-98127463}"
      MYSQL_DATABASE: restauranteweb
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./web2.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-98127463}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restaurant_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_URL=jdbc:mysql://db:3306/restauranteweb?useSSL=false&serverTimezone=UTC
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-98127463}
    ports:
      - "8081:8080"

  cloudflared-api:
    image: cloudflare/cloudflared:latest
    container_name: tunnel_backend
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN_BACKEND}

volumes:
  db_data:
