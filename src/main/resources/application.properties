spring.application.name=restaurant-api
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/restaurante?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:change-me}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jackson.serialization.write-dates-as-timestamps=false
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:Lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
app.security.allowed-origins=${APP_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3006}
app.bootstrap-admin.name=${BOOTSTRAP_ADMIN_NAME:}
app.bootstrap-admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
